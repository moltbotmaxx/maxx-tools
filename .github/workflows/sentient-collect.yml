name: collect-sentient-accounts

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: Source of the manual refresh request
        required: false
        type: string
        default: dashboard-ui
      requested_by:
        description: Free-form label for who asked for the refresh
        required: false
        type: string
        default: dashboard-ui
      source_url:
        description: URL that initiated the request
        required: false
        type: string
        default: ""
  schedule:
    - cron: "0 0,6,12,18 * * *"

permissions:
  contents: write

concurrency:
  group: sentient-accounts-collect
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Log trigger context
        env:
          TRIGGER_SOURCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.trigger_source || github.event_name }}
          REQUESTED_BY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.requested_by || github.actor }}
          SOURCE_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_url || '' }}
        run: |
          echo "Trigger source: ${TRIGGER_SOURCE}"
          echo "Requested by: ${REQUESTED_BY}"
          if [ -n "${SOURCE_URL}" ]; then
            echo "Source URL: ${SOURCE_URL}"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install collector dependencies
        run: pip install -r sentient-accounts/collector/requirements.txt

      - name: Restore persisted Instaloader session
        env:
          INSTALOADER_SESSION_FILE_B64: ${{ secrets.INSTALOADER_SESSION_FILE_B64 }}
        if: ${{ env.INSTALOADER_SESSION_FILE_B64 != '' }}
        run: |
          mkdir -p sentient-accounts/.instaloader
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          payload = os.environ["INSTALOADER_SESSION_FILE_B64"]
          path = Path("sentient-accounts/.instaloader/session-refresh")
          path.write_bytes(base64.b64decode(payload))
          print(f"Restored persisted session file to {path}")
          PY

      - name: Collect account metrics
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          INSTALOADER_SESSION_FILE: ".instaloader/session-refresh"
          ENABLE_REEL_VIEW_SCRAPE: "1"
          RECENT_POST_LIMIT: "24"
          RECENT_POST_WINDOW_DAYS: "14"
          RECENT_POST_COLLECTION_WINDOW_DAYS: "30"
          RECENT_POST_HARD_LIMIT: "180"
        run: python sentient-accounts/collector/collect.py

      - name: Aggregate datasets
        run: python sentient-accounts/collector/aggregate.py

      - name: Commit data updates
        run: |
          if [ -z "$(git status --porcelain sentient-accounts/data sentient-accounts/avatars)" ]; then
            echo "No dataset or avatar changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sentient-accounts/data sentient-accounts/avatars
          git commit -m "chore(data): update sentient-accounts metrics"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push rejected on attempt ${attempt}; fetching latest main and rebasing."
            git fetch origin main
            git rebase origin/main
          done

          echo "Unable to push sentient-accounts data after 3 attempts."
          exit 1
