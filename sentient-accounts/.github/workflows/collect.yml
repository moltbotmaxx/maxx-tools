name: collect-instagram-data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install collector dependencies
        run: pip install -r collector/requirements.txt

      - name: Restore persisted Instaloader session
        if: ${{ secrets.INSTALOADER_SESSION_FILE_B64 != '' && secrets.INSTAGRAM_USERNAME != '' }}
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTALOADER_SESSION_FILE_B64: ${{ secrets.INSTALOADER_SESSION_FILE_B64 }}
        run: |
          mkdir -p .instaloader
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          username = os.environ["INSTAGRAM_USERNAME"]
          payload = os.environ["INSTALOADER_SESSION_FILE_B64"]
          path = Path(".instaloader") / f"session-{username}"
          path.write_bytes(base64.b64decode(payload))
          print(f"Restored persisted session file to {path}")
          PY

      - name: Collect account metrics
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          RECENT_POST_LIMIT: "12"
        run: python collector/collect.py

      - name: Aggregate datasets
        run: python collector/aggregate.py

      - name: Commit data updates
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No dataset changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore(data): update instagram metrics"
          git push
