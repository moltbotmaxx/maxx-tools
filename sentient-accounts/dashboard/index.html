<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentient — Network Intelligence</title>
    <meta name="description" content="Fullscreen network analytics for Sentient accounts." />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css?v=5" />
    <script src="./data.js?v=4" defer></script>
    <script src="./vendor/three.min.js" defer></script>
    <script src="./vendor/OrbitControls.js" defer></script>
    <script src="./network.js?v=5" defer></script>
    <script src="./script.js?v=5" defer></script>
  </head>
  <body class="is-fullscreen">

    <!-- ═══ TOP HEADER (Integrated Brand + HUD) ═══ -->
    <header class="main-header">
      <div class="header-brand">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <div class="brand-name">Sentient</div>
          <div class="brand-sub">Intelligence Network</div>
        </div>
      </div>

      <div class="header-metrics">
        <div class="hud-stat">
          <span class="hud-stat-lbl">Followers</span>
          <span id="totalFollowers" class="hud-stat-val">0</span>
        </div>
        <div class="hud-stat">
          <span class="hud-stat-lbl">Total Likes</span>
          <span id="totalLikes" class="hud-stat-val">0</span>
        </div>
        <div class="hud-stat">
          <span class="hud-stat-lbl">Total Impressions</span>
          <span id="totalViews" class="hud-stat-val">0</span>
        </div>
        <div class="hud-stat">
          <span class="hud-stat-lbl">Reel Plays</span>
          <span id="totalReels" class="hud-stat-val">0</span>
        </div>
      </div>

      <div class="header-status">
        <button id="solid-toggle" class="hud-btn">
          <span class="btn-icon">▣</span>
          <span class="btn-lbl">SOLID</span>
        </button>
        <div class="status-dot"></div>
        <div class="status-info">
          <span class="status-text">CORE ACTIVE</span>
          <span class="status-timestamp" id="currentTimestamp"></span>
        </div>
      </div>
    </header>
    <div id="fullscreenNetwork" class="network-container">
      <div id="networkTooltip" class="net-tooltip" data-visible="false">
        <div class="net-tt-name"></div>
        <div class="net-tt-followers"></div>
        <div class="net-tt-engagement"></div>
        <div class="net-tt-posts"></div>
      </div>

      <!-- Intelligence Feed Toast (Integrated Tweet) -->
      <div class="network-toast">
        <div class="nt-inner">
          <div class="nt-avatar-placeholder"></div>
          <div class="nt-content">
            <div class="nt-header">
              <span class="nt-account">@account</span>
            </div>
            <div class="nt-body">
              <p class="nt-caption"></p>
            </div>
            <div class="nt-footer">
              <div class="nt-stat">
                <span class="lbl">Likes</span>
                <span class="nt-likes">0</span>
              </div>
              <div class="nt-stat">
                <span class="lbl">Comments</span>
                <span class="nt-comments">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ SIDE PANEL MODAL ═══ -->
    <aside id="sidePanel" class="side-panel">
      <div class="side-panel__inner">
        <div class="side-panel__body">
          <div id="panelContent" class="nd-content">
            <div class="nd-header">
              <img id="panelAvatar" class="nd-avatar" src="" alt="" />
              <div>
                <div id="panelName" class="nd-name"></div>
                <div id="panelHandle" class="nd-handle"></div>
              </div>
            </div>

            <div class="nd-stats">
              <div class="nd-stat">
                <div id="panelFollowers" class="nd-stat-val"></div>
                <div class="nd-stat-lbl">Followers</div>
              </div>
              <div class="nd-stat">
                <div id="panelEngagement" class="nd-stat-val"></div>
                <div class="nd-stat-lbl">Engagement</div>
              </div>
            </div>

            <div class="panel-section">
              <h3 class="section-lbl">BIO</h3>
              <div id="panelBio" class="nd-bio"></div>
            </div>

            <div class="panel-section">
              <h3 class="section-lbl">TOP TRANSMISSIONS</h3>
              <div id="panelPosts" class="nd-posts"></div>
            </div>

            <div class="panel-section">
              <h3 class="section-lbl">NETWORK STATUS</h3>
              <div class="status-grid">
                <div class="status-item"><span class="lbl">Reach</span><span id="panelReach" class="val"></span></div>
                <div class="status-item"><span class="lbl">Activity</span><span id="panelActivity" class="val"></span></div>
              </div>
            </div>

            <a id="panelLink" class="nd-link" href="#" target="_blank">View Live Profile ↗</a>
          </div>
        </div>
      </div>
    </aside>

    <div id="debug-panel" class="debug-panel">
      <div class="debug-header">
        <span>SYSTEM CALIBRATION</span>
        <button id="close-debug">×</button>
      </div>
      <div class="debug-body">
        <div class="control-group">
          <label>Flow Strength</label>
          <input type="range" id="param-wander" min="0" max="0.05" step="0.001">
          <span id="val-wander"></span>
        </div>
        <div class="control-group">
          <label>Max Speed</label>
          <input type="range" id="param-speed" min="0" max="0.1" step="0.005">
          <span id="val-speed"></span>
        </div>
        <div class="control-group">
          <label>Repulsion Strength</label>
          <input type="range" id="param-repulsion" min="0" max="0.05" step="0.001">
          <span id="val-repulsion"></span>
        </div>
        <div class="control-group">
          <label>Tether Strength</label>
          <input type="range" id="param-tether-s" min="0" max="0.002" step="0.0001">
          <span id="val-tether-s"></span>
        </div>
        <div class="control-group">
          <label>Tether Max Dist</label>
          <input type="range" id="param-tether-d" min="5" max="50" step="1">
          <span id="val-tether-d"></span>
        </div>
        <div class="control-group">
          <label>Chaos Burst</label>
          <input type="range" id="param-chaos" min="0" max="0.5" step="0.01">
          <span id="val-chaos"></span>
        </div>
        <button id="export-config" class="hud-btn" style="width:100%; margin-top:20px; justify-content:center;">
          EXPORT CONFIG
        </button>
      </div>
    </div>

    <button id="open-debug" class="debug-toggle-btn">⚙</button>

    <div id="appOverlay" class="app-overlay"></div>
  </body>
</html>
